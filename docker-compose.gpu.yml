# GPU override — użyj razem z docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
services:
  backend:
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
